       onmousedown="this.style.backgroundColor='#252424'; this.style.color='#FFFFFF'; this.style.border='4px solid #FFFFFF'; this.style.transform='scale(1)';"
       onmouseup="this.style.backgroundColor='#D2D2D2'; this.style.color='#252424'; this.style.border='4px solid #D2D2D2'; this.style.transform='scale(1)';"
>
  <span id="skriptInputText">Linienverlauf wählen...</span>
  <input type="file" id="skriptInput" accept=".json" style="display: none;" />
</label>
<script>
const skriptInput = document.getElementById('skriptInput');
const skriptInputText = document.getElementById('skriptInputText');

skriptInput.addEventListener('change', () => {
  if (skriptInput.files.length > 0) {
    skriptInputText.textContent = skriptInput.files[0].name;
  } else {
    skriptInputText.textContent = 'Linienverlauf wählen...';
  }
});
</script>

<script>
let config = {
  grundbild: "new",
  darkMode: "light",
  deafen: false
};

function playSound(type) {
  if (config.deafen) return;

  const audio = new Audio(
    type === "terminus"
      ? "audio/BVG_Gong_Endstation.wav"
      : "audio/BVG_Gong_Standard.wav"
  );

  audio.play().catch(() => {});
}

// Load config from JSON if possible
async function loadConfig() {
  try {
    const res = await fetch("config/config.json?cacheversion=" + Date.now())
    const data = await res.json();
    config = data;
  } catch (e) {
    console.warn("Config not found or parameter missing, using defaults");
  }
  applyConfig();
}

// Apply the settings to the page
function applyConfig() {
  // --- GRUNDBILD ---
  const grundbildSrc = config.grundbild === "old"
    ? "images/FahrinfoApp.png"
    : "images/BVG.png";
  grundbild.src = grundbildSrc;

  // --- DARK MODE OVERLAY ---
  const overlayFolder = config.darkMode === "dark"
    ? "images/LinienverlaufOverlays/DarkMode/"
    : "images/LinienverlaufOverlays/";

  // Assuming overlay image filenames remain unchanged
  const overlayFilename = overlay.src.split('/').pop(); // get current overlay filename
  overlay.src = overlayFolder + overlayFilename;

  // --- ANSCHLUSS OVERLAY ---
  const anschlussOverlayImg = document.querySelector(".anschlussAnzeigeOverlay");

  if (anschlussOverlayImg) {
    const basePath = config.darkMode === "dark"
      ? "images/LinienverlaufOverlays/DarkMode/"
      : "images/LinienverlaufOverlays/";

    anschlussOverlayImg.src = basePath + "KurzVorHalt_Anschlüsse.png";
  }

  // --- ANSCHLUSS TRENNSTRICHE ---
  const trennstrichSrc = config.darkMode === "dark"
    ? "images/Trennstrich_DarkMode.png"
    : "images/Trennstrich_LightMode.png";

  for (let i = 1; i <= 8; i++) {
    const trenn = document.querySelector(`.anschluss${i}Trennstrich`);
    if (trenn) trenn.src = trennstrichSrc;
  }

  // --- TEXT COLOR ---
  const textElements = [
    nextHalt, nextHaltZusatz,
    folge1, folge1Zusatz,
    folge2, folge2Zusatz,
    folge3,
    anschlussTitel, anschlussTitelZeit,
    beiHaltText, beiHaltZusatz
  ];

  textElements.forEach(el => {
    el.style.color = (config.darkMode === "dark") ? "#ffffff" : "#252424";
  });

  // --- ANSCHLUSS TEXT COLOR ---
  for (let i = 1; i <= 8; i++) {
    const linie = document.querySelector(`.anschluss${i}Linie`);
    const ziel = document.querySelector(`.anschluss${i}Ziel`);
    const zeit = document.querySelector(`.anschluss${i}Zeit`);

    const color = (config.darkMode === "dark") ? "#ffffff" : "#252424";

    if (linie) linie.style.color = color;
    if (ziel) ziel.style.color = color;
    if (zeit) zeit.style.color = color;
  }

  // --- UPDATE BUTTON TEXT ---
  const automaticLineProgression = document.getElementById("automaticLineProgression");
  if (automaticLineProgression) {
    automaticLineProgression.textContent = (config.lineProgression === "on")
      ? "automatischen Linienverlauf anhalten"
      : "automatischen Linienverlauf starten";
  }



  const darkModeBtn = document.getElementById("darkModeBtn");
  if (darkModeBtn) {
    darkModeBtn.textContent = (config.darkMode === "dark")
      ? "zum Light Mode wechseln"
      : "zum Dark Mode wechseln";
  }

  const grundbildBtn = document.getElementById("grundbildBtn");
  if (grundbildBtn) {
    grundbildBtn.textContent = (config.grundbild === "old")
      ? "Rückfallebene zum neuen Design wechseln"
      : "Rückfallebene zum alten Design wechseln";
  }

  const deafenBtn = document.getElementById("deafenBtn");
  if (deafenBtn) {
    deafenBtn.textContent = (config.deafen === true)
      ? "Gong-Sounds entstummen"
      : "Gong-Sounds stummschalten";
  }

  if (beiHaltLayer.style.display === "block") {
  const station = stations[currentIndex];
  const hasZusatz = station.AdditionalName && station.AdditionalName.trim() !== "";
  const isDouble = station.IsNameDoubleLined;
  const type = station.BarrierFreeType;

  let overlayFilename = "";
  if (type === 0) {
    overlayFilename = "BeiHalt.png";
  } else {
    const access = type === 1 ? "Rampe" : "Aufzug";
    if (hasZusatz) overlayFilename = `BeiHalt_${access}_Zusatztext.png`;
    else if (isDouble) overlayFilename = `BeiHalt_${access}_2Zeiler.png`;
    else overlayFilename = `BeiHalt_${access}_1Zeiler.png`;
  }

  const overlayFolder = config.darkMode === "dark"
    ? "images/LinienverlaufOverlays/DarkMode/"
    : "images/LinienverlaufOverlays/";

  beiHaltOverlay.src = overlayFolder + overlayFilename;
}
}

// Save config back to JSON (only works with local server)
async function saveConfig() {
  try {
    await fetch("saveConfig", {   // server endpoint, see note below
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(config)
    });
  } catch (e) {
    console.warn("Cannot save config: not running on local server");
  }
}

function automaticLineProgression() {
  config.lineProgression = config.lineProgression === "on" ? "off" : "on";
  applyConfig();
  saveConfig();
}


// Toggle dark/light mode
function toggleDarkMode() {
  config.darkMode = config.darkMode === "dark" ? "light" : "dark";
  applyConfig();
  saveConfig();
  channel.postMessage({ type: "darkModeChanged", value: config.darkMode });
}

// Toggle grundbild
function toggleGrundbild() {
  config.grundbild = config.grundbild === "old" ? "new" : "old";
  applyConfig();
  saveConfig();
  channel.postMessage({ type: "grundbildChanged", value: config.grundbild });
}

function toggleDeafen() {
  config.deafen = config.deafen === true ? false : true;
  applyConfig();
  saveConfig();
}

  const base = config.darkMode === "dark"
    ? "images/LinienverlaufOverlays/DarkMode/"
    : "images/LinienverlaufOverlays/";

  return base + filename;
}

// BARRIER FREE ICONS
function setBarrierIcons(prefix, type) {
  const aufzug = document.querySelector(`.${prefix}BarrierefreiheitAufzug`);
  const rampe = document.querySelector(`.${prefix}BarrierefreiheitRampe`);

// --- OFFSET FOR DOUBLE-LINED STATIONS ---
function applyOffset(isDoubleLine) {
  const offset = isDoubleLine ? 60 : 0;
  const elements = [
    '.folgeHalt1', '.folgeHalt1Namenszusatz',
    '.folgeHalt2', '.folgeHalt2Namenszusatz',
    '.folgeHalt1BarrierefreiheitAufzug', '.folgeHalt1BarrierefreiheitRampe',
    '.folgeHalt2BarrierefreiheitAufzug', '.folgeHalt2BarrierefreiheitRampe'
  ];

  elements.forEach(selector => {
    const el = document.querySelector(selector);
    if (!el) return;
    if (!el.dataset.baseTop) el.dataset.baseTop = parseInt(window.getComputedStyle(el).top);
    el.style.top = (parseInt(el.dataset.baseTop) + offset) + "px";
  });
}

// --- OVERLAY SELECTION ---
function updateOverlay(count, isDoubleLine) {
  const remaining = stations.length - currentIndex;

  if (remaining === 1) {
    overlay.src = getOverlayPath("BeiFahrt_1Station.png");
    return;
  }

  const zeiler = isDoubleLine ? "2Zeiler" : "1Zeiler";

  overlay.src = remaining > 4
    ? getOverlayPath(`BeiFahrt_${zeiler}_5Stationen.png`)
    : getOverlayPath(`BeiFahrt_${zeiler}_${remaining}Stationen.png`);
}

// --- VISIBLE STATIONS ---
function getVisibleStations() {
  const remaining = stations.length - currentIndex;
  if (remaining <= 4) return stations.slice(currentIndex);

  const result = stations.slice(currentIndex, currentIndex+3);
  const lastStation = stations[stations.length-1];
  if (!result.includes(lastStation)) result.push(lastStation);
  return result;
}

// --- CLEAR UNUSED SLOTS ---
function clearSlot(slot) {
  if (slot === 1) { folge1.innerHTML = ""; folge1Zusatz.textContent = ""; clearBarrierIcons("folgeHalt1"); }
  if (slot === 2) { folge2.innerHTML = ""; folge2Zusatz.textContent = ""; clearBarrierIcons("folgeHalt2"); }
  if (slot === 3) { folge3.innerHTML = ""; clearBarrierIcons("folgeHalt3"); }
}

// --- RENDER FUNCTION ---
function render() {
  if (!stations.length) return;
  const visible = getVisibleStations();
  const count = visible.length;
  const isDouble = visible[0].IsNameDoubleLined;

  updateOverlay(count, isDouble);
  applyOffset(isDouble);
  updateLineBackground();

  // NEXT
  const s0 = visible[0];
  nextHalt.innerHTML = s0.NextStationName;
  nextHaltZusatz.textContent = s0.AdditionalName;
  setBarrierIcons("nextHalt", s0.BarrierFreeType);

  // FOLLOWING SLOTS
  if (visible[1]) { folge1.innerHTML = visible[1].FollowingStationName; folge1Zusatz.textContent = visible[1].AdditionalName; setBarrierIcons("folgeHalt1", visible[1].BarrierFreeType); } else clearSlot(1);
  if (visible[2]) { folge2.innerHTML = visible[2].FollowingStationName; folge2Zusatz.textContent = visible[2].AdditionalName; setBarrierIcons("folgeHalt2", visible[2].BarrierFreeType); } else clearSlot(2);
  if (visible[3]) { folge3.innerHTML = visible[3].FollowingStationName; setBarrierIcons("folgeHalt3", visible[3].BarrierFreeType); } else clearSlot(3);
}

// --- FILE LOAD WITH ERROR HANDLING ---
skriptInput.addEventListener('change', () => {

const digits = currentLine.substring(1).split("");

const hasBeginningAt =

  data.BeginningAt.trim() !== "";

const isDualLine = hasBeginningAt && digits.length === 2;

window.dualConfig = { active: false };

if (isDualLine) {
  // --- EXTRACT DIGITS FIRST ---
const digits = currentLine.substring(1).split("");

const hasBeginningAt =

const isDualLine = hasBeginningAt && digits.length === 2;

window.dualConfig = { active: false };

if (isDualLine) {
  const parts = digits.map(d => "U" + d);
  const beginning = normalizeLine(data.BeginningAt);

  // ✅ correct validation
  if (!beginning || !parts.includes(beginning)) {

  }

  };
}
      }

      // --- HIDE DEFAULT IMAGE ---

let autoTimerNext = null;

let autoTimerRestart = null;

function automaticLineProgression() {
  if (autoProgressionRunning) {
    stopAutoProgression();
  } else {
    startAutoProgression();
  }

  config.lineProgression = autoProgressionRunning ? "on" : "off";
  applyConfig();
  saveConfig();
}

function startAutoProgression() {
  if (!stations.length) return;

  autoProgressionRunning = true;
  runAutoCycle();
}

function stopAutoProgression() {
  autoProgressionRunning = false;

  clearTimeout(autoTimerNext);
  clearTimeout(autoTimerBeiHalt);
  clearTimeout(autoTimerRestart);

  autoTimerNext = null;
  autoTimerBeiHalt = null;
  autoTimerRestart = null;

  hideAnschluss();
}

function runAutoCycle() {
  if (!autoProgressionRunning || !stations.length) return;

  // 🛑 HARD GUARD: already at last station
  if (currentIndex >= stations.length - 1) {
    stopAutoProgression();

    if (config.lineTurnaround === "on") {
      setTimeout(() => {
        triggerAutoTurnaround();
        startAutoProgression();
      }, 2000);
    }

    return;
  }

  // --- 00:40 → NEXT STATION
  autoTimerNext = setTimeout(() => {
    if (!autoProgressionRunning) return;

    document.getElementById('forwardButton').click();

  }, 40000);

  // --- 01:25 → BEI HALT
  autoTimerBeiHalt = setTimeout(() => {
    if (!autoProgressionRunning) return;

    showBeiHalt();
    channel.postMessage({ type: "showBeiHalt" });

    const isLast = currentIndex >= stations.length - 1;

    // 🛑 LAST STATION REACHED DURING CYCLE
    if (isLast) {
      stopAutoProgression();
      return;
    }

    // 🔁 NORMAL LOOP
    autoTimerRestart = setTimeout(runAutoCycle, 0);

  }, 95000); // 95s equals to 1min 35s. That's the time for one full loop.
}

<script>
let currentPage = 0;
let pageInterval = null;
let totalPagesGlobal = 1;
let anschlussDelayTimer = null;
let anschlussDataCache = null;
let preloadTimer = null;
let anschlussActive = false;
let refreshInterval = null;

const anschlussOverlay = document.getElementById("LinienverlaufOverlay");

function getPagedConnections(all) {
  const start = currentPage * 4;
  return all.slice(start, start + 4);
}

function getMinutesUntil(departureTime) {
  const now = Date.now();
  const dep = new Date(departureTime).getTime();
  const diffMs = dep - now;
  if (diffMs <= 60000) return 1;
  return Math.ceil(diffMs / 60000);
}

function normalizeLine(line) {
  return (line || "").toUpperCase().replace(/\s+/g, "");
}

function cleanDirection(direction) {
  if (!direction) return "?";
  let result = direction;
  result = result.split(/\s+via\s+/i)[0];
  result = result.split(/\s+->\s+/i)[0];
  result = result.replace(/\(Berlin\)/gi, "");
  result = result.replace(/\(b\. Bln\)/gi, "");
  result = result.replace(/^Potsdam,\s/, "");
  result = result.replace(/^Köpenick,\s/, "");
  result = result.split(/\(TF\)/i)[0];
  result = result.split("[")[0];
  result = result.replace(/⟳/g, "").trim();
  result = result.replace(/⟲/g, "").trim();
  result = result.replace(/\b, Bahnhof\b/gi, "").trim();
  result = result.replace(/^Ersatzverkehr\s+/i, "");
  result = result.replace(/\s{2,}/g, " ").trim();
  result = trimToFit(result, 1200);
  return result;
}

function trimToFit(text, maxWidth) {
  const testEl = document.createElement("span");
  testEl.style.visibility = "hidden";
  testEl.style.position = "absolute";
  testEl.style.whiteSpace = "nowrap";
  testEl.style.fontFamily = "TransitPro";
  testEl.style.fontSize = "86px";
  document.body.appendChild(testEl);
  let result = text;
  testEl.textContent = result;
  if (testEl.offsetWidth <= maxWidth) {
    document.body.removeChild(testEl);
    return result;
  }
  const slashIndex = result.lastIndexOf("/");
  const commaIndex = result.lastIndexOf(",");
  const cutIndex = Math.max(slashIndex, commaIndex);
  if (cutIndex !== -1) {
    result = result.substring(0, cutIndex).trim();
    testEl.textContent = result;
  }
  document.body.removeChild(testEl);
  return result;
}

function showAnschlussDelayed() {
  if (anschlussDelayTimer) clearTimeout(anschlussDelayTimer);
  anschlussDelayTimer = setTimeout(() => {
    activateAnschluss();
  }, 10000);
}

function activateAnschluss() {
  // placeholder – currently handled via restartAnschlussTimer
}

function hideAnschluss() {
  anschlussActive = false;

  if (anschlussDelayTimer) {
    clearTimeout(anschlussDelayTimer);
    anschlussDelayTimer = null;
  }
  if (pageInterval) {
    clearInterval(pageInterval);
    pageInterval = null;
  }
  if (refreshInterval) {          // <-- NEW: clear the update loop
    clearInterval(refreshInterval);
    refreshInterval = null;
  }
  const wrapper = document.querySelector(".anschlussAnzeige");
  if (wrapper) wrapper.style.display = "none";
  if (anschlussOverlay) {
    anschlussOverlay.style.visibility = "visible";
  }
}

function restartAnschlussTimer() {
  hideAnschluss();

  if (preloadTimer) clearTimeout(preloadTimer);
  if (anschlussDelayTimer) clearTimeout(anschlussDelayTimer);
  if (pageInterval) clearInterval(pageInterval);

  currentPage = 0;
  anschlussDataCache = null;

  preloadTimer = setTimeout(() => {
    preloadAnschlussData();
  }, 9500);

  anschlussDelayTimer = setTimeout(() => {
    showPreloadedAnschluss();
  }, 10000);
}

async function preloadAnschlussData() {
  if (!stations.length) return;
  const station = stations[currentIndex];
  const stopId = station.StationID;
  if (!stopId) return;
  try {
    const res = await fetch(
      `https://v6.bvg.transport.rest/stops/${stopId}/departures?express=false&ferry=false`
    );
    const json = await res.json();
    const departures = json.departures || [];
    const mapped = departures
      .map(dep => {
        if (!dep.when || !dep.line) return null;
        const line = dep.line.name;
        const product = dep.line?.product || "unknown";
        const normalized = normalizeLine(line);
        if (normalized === currentLine && product === "subway") return null;
        const timestamp = new Date(dep.when).getTime();
        const minutes = Math.ceil((timestamp - Date.now()) / 60000);
        if (minutes < 1) return null;
        let icon = "bus.png";
        let displayLine = line || "";
        if (product === "bus") icon = "bus.png";
        else if (product === "tram") icon = "tram.png";
        else if (product === "suburban" || product === "subway") {
          icon = `${line}.png`;
          displayLine = "";
        } else if (product === "regional" || product === "national") {
          icon = "bahn.png";
        }
        let direction = cleanDirection(dep.direction);
        return { displayLine, direction, minutes, icon, timestamp };
      })
      .filter(Boolean)
      .sort((a, b) => a.timestamp - b.timestamp)
      .slice(0, 8);

    anschlussDataCache = mapped;
    renderAnschluesse(anschlussDataCache);
  } catch (err) {
    console.error("Preload error:", err);
  }
}

// ------- NEW: silent periodic refresh -------
async function refreshAnschlussData() {
  if (!anschlussActive || !stations.length) return;
  const station = stations[currentIndex];
  const stopId = station.StationID;
  if (!stopId) return;
  try {
    const res = await fetch(
      `https://v6.bvg.transport.rest/stops/${stopId}/departures?express=false&ferry=false`
    );
    const json = await res.json();
    const departures = json.departures || [];
    const mapped = departures
      .map(dep => {
        if (!dep.when || !dep.line) return null;
        const line = dep.line.name;
        const product = dep.line?.product || "unknown";
        const normalized = normalizeLine(line);
        if (normalized === currentLine && product === "subway") return null;
        const timestamp = new Date(dep.when).getTime();
        const minutes = Math.ceil((timestamp - Date.now()) / 60000);
        if (minutes < 1) return null;
        let icon = "bus.png";
        let displayLine = line || "";
        if (product === "bus") icon = "bus.png";
        else if (product === "tram") icon = "tram.png";
        else if (product === "suburban" || product === "subway") {
          icon = `${line}.png`;
          displayLine = "";
        } else if (product === "regional" || product === "national") {
          icon = "bahn.png";
        }
        let direction = cleanDirection(dep.direction);
        return { displayLine, direction, minutes, icon, timestamp };
      })
      .filter(Boolean)
      .sort((a, b) => a.timestamp - b.timestamp)
      .slice(0, 8);

    // remember previous page count
    const prevPages = totalPagesGlobal;

    // update cache and re-render current page (clamps if necessary)
    anschlussDataCache = mapped;
    renderAnschluesse(mapped);

    // handle page count changes
    adjustPageRotation(prevPages);
  } catch (err) {
    console.error("Refresh error:", err);
  }
}

function adjustPageRotation(prevPages) {
  if (totalPagesGlobal > 1) {
    if (prevPages <= 1 || !pageInterval) {
      // pages have increased – restart rotation from page 1
      if (pageInterval) clearInterval(pageInterval);
      currentPage = 0;
      startPageRotation(() => anschlussDataCache);
    }
  } else {
    // only one page – stop rotating
    if (pageInterval) {
      clearInterval(pageInterval);
      pageInterval = null;
    }
  }
}
// -------------------------------------------------

function showPreloadedAnschluss() {
  if (!anschlussDataCache || !anschlussDataCache.length) return;

  const wrapper = document.querySelector(".anschlussAnzeige");
  if (wrapper) wrapper.style.display = "block";

  if (anschlussOverlay) {
    anschlussOverlay.style.visibility = "hidden";
  }

  anschlussActive = true;

  // start the page rotation (only if > 1 page)
  if (totalPagesGlobal > 1) {
    startPageRotation(() => anschlussDataCache);
  } else {
    // if only one page, just render it without interval
    renderAnschluesse(anschlussDataCache);
  }

  // <-- NEW: start the 10‑second update loop
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(refreshAnschlussData, 10000);
}

function renderAnschluesse(data) {
  const itemsPerPage = 4;
  const pages = [];
  for (let i = 0; i < data.length; i += itemsPerPage) {
    pages.push(data.slice(i, i + itemsPerPage));
  }

  // clamp page index if out of bounds
  if (currentPage >= pages.length) {
    currentPage = 0;
  }

  const pageData = pages[currentPage] || [];

  for (let i = 1; i <= 8; i++) {
    const wrapper = document.querySelector(`.anschluss${i}`);
    const linie = document.querySelector(`.anschluss${i}Linie`);
    const ziel = document.querySelector(`.anschluss${i}Ziel`);
    const zeit = document.querySelector(`.anschluss${i}Zeit`);
    const icon = document.querySelector(`.anschluss${i}Icon`);

    const item = pageData[i - 1];
    if (item) {
      if (wrapper) wrapper.style.display = "block";
      if (icon) icon.src = `images/AnschlussIcons/${item.icon || "unknown.png"}`;
      if (linie) linie.textContent = item.displayLine;
      if (ziel) ziel.textContent = item.direction || "";
      if (zeit) zeit.textContent = item.minutes ?? "";
    } else {
      if (wrapper) wrapper.style.display = "none";
    }
  }

  totalPagesGlobal = pages.length;
  updatePageIndicator();
}

function updatePageIndicator() {
  const indicator = document.querySelector(".anschlussSeiteZeichen");
  if (!indicator) return;
  const totalPages = Math.max(1, totalPagesGlobal);
  if (totalPages <= 1) {
    indicator.src = "images/AnschlussSeite_Solo.png";
    return;
  }
  indicator.src = currentPage === 0
    ? "images/AnschlussSeite_Dual_1.png"
    : "images/AnschlussSeite_Dual_2.png";
}

function startPageRotation(getDataCallback) {
  if (pageInterval) clearInterval(pageInterval);
  pageInterval = setInterval(() => {
    currentPage++;
    const data = getDataCallback();
    const maxPages = Math.ceil((data?.length || 0) / 4);
    if (currentPage >= maxPages) {
      currentPage = 0;
    }
    renderAnschluesse(data);
    updatePageIndicator();
  }, 10000);
}
