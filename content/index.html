<body style="background-color:#252424;">



<label
  style="
    position: absolute;
    top: 50px;

  "><img src="images/BerlinerFensterIcon_48px.png"></label>

<label
  style="
    position: absolute;
    top: 50px;
    left: 214px;
    color: #ffffff;
    font-size: 48px;

  ">Berliner Fenster Simulator</label>

<label
  style="
    position: absolute;
    top: 100px;

    color: #ffffff;

    font-family: TransitPro-BoldItalic;

<label
  style="
    position: absolute;
    top: 180px;
    left: 150px;
    color: #ffffff;
    font-size: 24px;
    font-family: TransitPro;
    cursor: default;
  "
  >Eine originalgetreue Nachbildung der Fahrgastinformationsanzeige aus dem Berliner Fenster der U-Bahnen der BVG.
  <br>Dieser Nachbau erlaubt in Kombination mit .json-Dateien die Darstellung realistischer Linienverläufe der echten U-Bahnlinien,
  <br>sowie aber auch eigene fiktive Linien welche man sich selbst erstellen kann.
  <br>
  <br>Die unten liegenden Knöpfe führen jeweils zum Simulator selbst sowie zur Linienverlaufbearbeitungsseite. Viel Spaß mit dem Projekt!
</label>

<button onclick="document.location='BerlinerFensterSimulator.html'"
  style="
    position: absolute;
    top: 400px;
    left: 150px;
    width: 800px;
    height: 80px;
    background-color: #FFFFFF;
    color: #252424;
    font-size: 32px;
    font-family: TransitPro-Bold;
    border: 4px solid #D2D2D2;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.1s ease;
  "
  onmouseover="this.style.backgroundColor='#D2D2D2'; this.style.color='#252424';"
  onmouseout="this.style.backgroundColor='#FFFFFF'; this.style.color='#252424';"
  onmousedown="this.style.backgroundColor='#252424'; this.style.color='#FFFFFF'; this.style.border='4px solid #FFFFFF'; this.style.transform='scale(1)';"
  onmouseup="this.style.backgroundColor='#D2D2D2'; this.style.color='#252424'; this.style.border='4px solid #D2D2D2'; this.style.transform='scale(1)';"
>zum Berliner Fenster Simulator</button>
